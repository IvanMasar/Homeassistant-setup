    header:
      card:
        type: markdown
        text_only: true
        content: >-
          # Hello {{ user }}

          It's {{ states('sensor.time') }}, the weather {{
          states('weather.forecast_home') }} with {{
          state_attr('weather.forecast_home', 'temperature') }}°C. There are {{
          states('sensor.lights_and_switches_on_count') }} lights on and {{
          states('sensor.door_open_count') }} door open.
        visibility:
          - condition: screen
            media_query: '(min-width: 768px)'
      layout: responsive
      badges_position: bottom
      badges_wrap: scroll
    badges:
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.lights_and_switches_on_count
        color: amber
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.door_open_count
        color: red
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: person.ivan_masar
        show_entity_picture: true
        visibility:
          - condition: user
            users:
              - e18ef9786cfa435793d0ce56f578d968
