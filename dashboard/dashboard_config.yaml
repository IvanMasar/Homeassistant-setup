kiosk_mode:
  hide_header: true
button_card_templates:
  button_card_templates: null
  light_slider:
    show_icon: true
    show_label: true
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    state:
      - value: 'on'
        label: |-
          [[[ 
            // 1. Prepínač 2 = Left
            if (entity.entity_id == 'light.wifi_smart_switch_prepinac_2') return "Left";
            
            // 2. Prepínač 1 = Right (s preklepom smrt podla tvojho zadania)
            if (entity.entity_id == 'light.wifi_smart_switch_prepinac_1') return "Right";
            
            // 3. Ak má svetlo jas, vypočítaj percentá (pre WLED atď.)
            if (entity.attributes.brightness)
              return Math.round(entity.attributes.brightness / 255 * 100) + '%';
            
            // 4. Záchrana pre iné prípady
            return "Zapnuté";
          ]]]
        styles:
          card:
            - background: |
                [[[
                  var color = entity.attributes?.rgb_color;
                  if (color) {
                    return 'rgba(' + color + ')';
                  } else {
                    return 'rgb(249, 220, 135)';
                  }
                ]]]
    custom_fields:
      slider:
        card:
          type: custom:my-slider-v2
          entity: '[[[ return entity.entity_id ]]]'
          colorMode: brightness
          styles:
            container:
              - background: none
              - border-radius: 100px
              - overflow: visible
            card:
              - height: 16px
              - padding: 0 8px
              - display: |
                  [[[
                    if (entity.entity_id == 'light.wifi_smart_switch_prepinac_1' || entity.entity_id == 'light.wifi_smart_switch_prepinac_2') return 'none';
                    return 'block';
                  ]]]
              - background: |
                  [[[
                    if (entity.state == "on") return "linear-gradient(90deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255, 1) 100%)";
                    else return "grey";
                  ]]]
            track:
              - overflow: visible
              - background: none
            progress:
              - background: none
            thumb:
              - background: black
              - height: 14px
              - width: 14px
              - border-radius: 50%
              - box-shadow: 0 0 6px rgba(0,0,0,0.4)
              - transition: transform 0.2s ease
              - position: absolute
              - top: 50%
              - transform: translateY(-50%)
    styles:
      grid:
        - grid-template-areas: |
            [[[
              if (entity.entity_id == 'light.wifi_smart_switch_prepinac_1' || entity.entity_id == 'light.wifi_smart_switch_prepinac_2') return '"l i" "n n"';
              return '"l i" "n n" "slider slider"';
            ]]]
        - grid-template-columns: 1fr 1fr
        - grid-template-rows: 1fr min-content
      icon:
        - width: 20px
        - color: white
      img_cell:
        - background-color: black
        - width: 35px
        - height: 35px
        - margin-top: 5px
        - margin-right: 10px
        - justify-self: end
        - align-self: center
        - border-radius: 100%
      name:
        - justify-self: start
        - font-size: 11px
        - margin-bottom: 8px
        - color: |
            [[[
              if (entity.state == "on") return "black";
              else return "#FFFFFF";
            ]]]
        - opacity: 0.7
      card:
        - height: 90px
        - background-color: |
            [[[
              if (entity.state == "on") return "yellow";
              else return "#1a1a1a";
            ]]]
        - box-shadow: none
        - border-radius: 24px
        - padding: 0 0 12px 14px
      label:
        - justify-self: start
        - font-size: 20px
        - margin-top: 20px
        - font-weight: 500
        - color: |
            [[[
              if (entity.state == "on") return "black";
              else return "#FFFFFF";
            ]]]
      custom_fields:
        slider:
          - padding-right: 16px
          - display: |
              [[[
                if (entity.entity_id == 'light.wifi_smart_switch_prepinac_1' || entity.entity_id == 'light.wifi_smart_switch_prepinac_2') return 'none';
                return 'block';
              ]]]
  plug_card:
    show_label: true
    variables:
      icon_on: '[[[ return entity.attributes.icon ]]]'
      icon_off: '[[[ return entity.attributes.icon ]]]'
      color: rgb(233, 187, 250)
    show_state: true
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    state:
      - value: 'on'
        icon: '[[[ return variables.icon_on ]]]'
        styles:
          card:
            - background-color: '[[[ return variables.color ]]]'
      - value: 'off'
        icon: '[[[ return variables.icon_off ]]]'
        styles:
          card:
            - background-color: null
    custom_fields:
      icon2:
        card:
          type: custom:button-card
          icon: |
            [[[ 
              if (entity.state == "on") {
                return "mdi:toggle-switch";
              } else {
                return "mdi:toggle-switch-off";
              }
            ]]]
          styles:
            card:
              - background-color: null
              - width: 27px
              - height: 27px
            icon:
              - width: 15px
              - color: null
    styles:
      grid:
        - grid-template-areas: '''i s icon2'' '' n n n'''
        - grid-template-columns: 20px 1fr 1fr
        - grid-template-rows: 1fr min-content
      icon:
        - width: 20px
        - margin-top: 7px
        - color: |
            [[[
              if (entity.state == "on") return "black";
              else return "white";
            ]]]
      img_cell:
        - justify-content: flex-start
      name:
        - justify-self: start
        - font-size: 11px
        - margin-bottom: 3px
        - color: |
            [[[
              if (entity.state == "on") return "black";
              else return "white";
            ]]]
        - opacity: 0.7
      card:
        - height: 90px
        - background-color: |
            [[[
              if (entity.state == "on") return 'rgb(249, 220, 135)';
              else return "white";
            ]]]
        - box-shadow: none
        - padding: 12px 0 12px 14px
        - border-radius: 24px
      state:
        - justify-self: start
        - font-size: 20px
        - margin-top: 11px
        - padding-left: 3px
        - font-weight: 500
        - color: |
            [[[
              if (entity.state == "on") return "black";
              else return "white";
            ]]]
      custom_fields:
        icon2:
          - margin-top: '-20px'
          - justify-self: end
          - align-self: center
          - width: 24px
          - padding-right: 10px
  door_card:
    show_label: true
    name: Door
    variables:
      icon_on: mdi:door-open
      icon_off: mdi:door-closed
      state_on: 'on'
      state_off: 'off'
      background_color_on: rgb(244, 184, 139)
      background_color_off: null
      color_on: black
      color_off: null
      state: |
        [[[
          if (entity.state == "on") return '<span style="font-size:0.7em;">Open</span>';
          else return '<span style="font-size:0.6em;">Closed</span>';
        ]]]
    label: '[[[ return variables.state ]]]'
    state:
      - value: '[[[ return variables.state_on ]]]'
        icon: '[[[ return variables.icon_on ]]]'
        styles:
          card:
            - background-color: '[[[ return variables.background_color_on ]]]'
          name:
            - color: '[[[ return variables.color_on ]]]'
          label:
            - color: '[[[ return variables.color_on ]]]'
      - value: '[[[ return variables.state_off ]]]'
        icon: '[[[ return variables.icon_off ]]]'
        styles:
          card:
            - background-color: '[[[ return variables.background_color_off ]]]'
          name:
            - color: '[[[ return variables.color_off ]]]'
          label:
            - color: '[[[ return variables.color_off ]]]'
    styles:
      card:
        - padding: 20px 20px 12px 14px
        - height: 129px
        - background: null
        - border-radius: 24px
      grid:
        - grid-template-areas: '"i" "l" "n"'
      img_cell:
        - justify-self: end
        - align-self: start
        - background: black
        - padding: 7px
        - border-radius: 50%
        - margin: '-16px -16px 0 0'
        - width: 30px
        - height: 30px
      icon:
        - width: 24px
        - height: 24px
        - color: null
      name:
        - justify-self: start
        - font-size: 11px
        - color: null
      label:
        - justify-self: start
        - font-size: 26px
        - font-weight: 500
        - color: null
        - margin-top: 10px
  bed_card:
    show_label: true
    name: Door
    variables:
      icon_on: mdi:bed
      icon_off: mdi:bed-empty
      state_on: 'on'
      state_off: 'off'
      background_color_on: rgb(240, 149, 141)
      background_color_off: null
      color_on: black
      color_off: null
      state: |
        [[[
          if (entity.state == "on") return '<span style="font-size:0.7em;">On</span>';
          else return '<span style="font-size:0.6em;">Off</span>';
        ]]]
    label: '[[[ return variables.state ]]]'
    state:
      - value: '[[[ return variables.state_on ]]]'
        icon: '[[[ return variables.icon_on ]]]'
        styles:
          card:
            - background-color: '[[[ return variables.background_color_on ]]]'
          name:
            - color: '[[[ return variables.color_on ]]]'
          label:
            - color: '[[[ return variables.color_on ]]]'
      - value: '[[[ return variables.state_off ]]]'
        icon: '[[[ return variables.icon_off ]]]'
        styles:
          card:
            - background-color: '[[[ return variables.background_color_off ]]]'
          name:
            - color: '[[[ return variables.color_off ]]]'
          label:
            - color: '[[[ return variables.color_off ]]]'
    styles:
      card:
        - padding: 20px 20px 12px 14px
        - height: 129px
        - background: null
        - border-radius: 24px
      grid:
        - grid-template-areas: '"i" "l" "n"'
      img_cell:
        - justify-self: end
        - align-self: start
        - background: black
        - padding: 7px
        - border-radius: 50%
        - margin: '-16px -16px 0 0'
        - width: 30px
        - height: 30px
      icon:
        - width: 24px
        - height: 24px
        - color: null
      name:
        - justify-self: start
        - font-size: 11px
        - color: null
      label:
        - justify-self: start
        - font-size: 26px
        - font-weight: 500
        - color: null
        - margin-top: 10px
  motion_card:
    show_label: true
    name: Motion
    variables:
      icon_on: mdi:motion-sensor
      icon_off: mdi:motion-sensor-off
      state_on: 'on'
      state_off: 'off'
      background_color_on: rgb(219, 245, 169)
      background_color_off: null
      color_on: black
      color_off: null
      state: |
        [[[
          if (entity.state == "on") return '<span style="font-size:0.7em;">Detected</span>';
        else return '<span style="font-size:0.6em;">Cleared</span>';
        ]]]
    label: '[[[ return variables.state ]]]'
    state:
      - value: '[[[ return variables.state_on ]]]'
        icon: '[[[ return variables.icon_on ]]]'
        styles:
          card:
            - background-color: '[[[ return variables.background_color_on ]]]'
          name:
            - color: '[[[ return variables.color_on ]]]'
          label:
            - color: '[[[ return variables.color_on ]]]'
      - value: '[[[ return variables.state_off ]]]'
        icon: '[[[ return variables.icon_off ]]]'
        styles:
          card:
            - background-color: '[[[ return variables.background_color_off ]]]'
          name:
            - color: '[[[ return variables.color_off ]]]'
          label:
            - color: '[[[ return variables.color_off ]]]'
    styles:
      card:
        - padding: 20px 20px 12px 14px
        - height: 129px
        - background: null
        - border-radius: 24px
      grid:
        - grid-template-areas: '"i" "l" "n"'
      img_cell:
        - justify-self: end
        - align-self: start
        - background: black
        - padding: 7px
        - border-radius: 50%
        - margin: '-16px -16px 0 0'
        - width: 30px
        - height: 30px
      icon:
        - width: 24px
        - height: 24px
        - color: null
      name:
        - justify-self: start
        - font-size: 11px
        - color: null
      label:
        - justify-self: start
        - font-size: 26px
        - font-weight: 500
        - color: null
        - margin-top: 10px
views:
  - title: Home
    sections:
      - type: grid
        cards:
          - type: custom:button-card
            styles:
              grid:
                - grid-template-areas: '''item1'''
                - grid-template-columns: 1fr 1fr 1fr
              card:
                - padding: 5px 0px
                - background: none
                - box-shadow: none
              custom_fields:
                item1:
                  - justify-self: center
            custom_fields:
              item1:
                card:
                  type: custom:button-card
                  entity: weather.forecast_home
                  show_label: true
                  show_state: true
                  show_name: false
                  label: >-
                    [[[ return
                    states["weather.forecast_home"].attributes.temperature +
                    "°C"; ]]]
                  styles:
                    card:
                      - border-radius: 0px
                      - box-shadow: none
                      - padding-right: 0px
                      - background: none
                    grid:
                      - grid-template-areas: '''i s'' ''i l'''
                      - grid-template-columns: min-content
                      - column-gap: 10px
                    icon:
                      - width: 20px
                      - color: rgb(162, 173, 197)
                    img_cell:
                      - width: 20px
                    state:
                      - justify-self: start
                      - font-size: 10px
                      - font-weight: 500
                      - color: grey
                    label:
                      - justify-self: start
                      - font-size: 15px
                      - font-weight: 700
                  tap_action:
                    action: more-info
            grid_options:
              columns: full
          - type: vertical-stack
            cards:
              - type: heading
                icon: mdi:star
                heading: Favorites
                heading_style: title
              - square: true
                type: grid
                cards:
                  - type: custom:button-card
                    entity: light.kids_room_lights
                    name: Kids room lights
                    variables:
                      icon_on: '[[[ return entity.attributes.icon ]]]'
                      icon_off: '[[[ return entity.attributes.icon ]]]'
                      color: rgb(245,210,123)
                    show_state: true
                    tap_action:
                      action: toggle
                    hold_action:
                      action: more-info
                    state:
                      - value: 'on'
                        icon: '[[[ return variables.icon_on ]]]'
                        styles:
                          card:
                            - background-color: '[[[ return variables.color ]]]'
                      - value: 'off'
                        icon: '[[[ return variables.icon_off ]]]'
                        styles:
                          card:
                            - background-color: null
                    custom_fields:
                      icon2:
                        card:
                          type: custom:button-card
                          icon: |
                            [[[ 
                              if (entity.state == "on") {
                                return "mdi:toggle-switch";
                              } else {
                                return "mdi:toggle-switch-off";
                              }
                            ]]]
                          styles:
                            card:
                              - background-color: null
                              - width: 27px
                              - height: 27px
                            icon:
                              - width: 15px
                              - color: null
                    styles:
                      grid:
                        - grid-template-areas: '''i s icon2'' '' n n n'''
                        - grid-template-columns: 20px 1fr 1fr
                        - grid-template-rows: 1fr min-content
                      icon:
                        - width: 20px
                        - margin-top: 7px
                        - color: |
                            [[[
                              if (entity.state == "on") return "black";
                              else return "white";
                            ]]]
                      img_cell:
                        - justify-content: flex-start
                      name:
                        - justify-self: start
                        - font-size: 11px
                        - margin-bottom: 3px
                        - color: |
                            [[[
                              if (entity.state == "on") return "black";
                              else return "white";
                            ]]]
                        - opacity: 0.7
                      card:
                        - height: 90px
                        - background-color: |
                            [[[
                              if (entity.state == "on") return 'rgb(249, 220, 135)';
                              else return "white";
                            ]]]
                        - box-shadow: none
                        - padding: 12px 0 12px 14px
                        - border-radius: 24px
                      state:
                        - justify-self: start
                        - font-size: 20px
                        - margin-top: 11px
                        - padding-left: 3px
                        - font-weight: 500
                        - color: |
                            [[[
                              if (entity.state == "on") return "black";
                              else return "white";
                            ]]]
                      custom_fields:
                        icon2:
                          - margin-top: '-20px'
                          - justify-self: end
                          - align-self: center
                          - width: 24px
                          - padding-right: 10px
                  - type: conditional
                    conditions:
                      - condition: location
                        locations:
                          - not_home
                          - School
                    card:
                      type: custom:button-card
                      entity: person.ivan_masar
                      variables:
                        sensor: sensor.ivans_iphone_battery_level
                      show_state: true
                      show_entity_picture: true
                      tap_action:
                        action: more-info
                      state:
                        - value: not_home
                          styles:
                            entity_picture:
                              - filter: grayscale(100%)
                      styles:
                        grid:
                          - grid-template-areas: '''i n btn'' ''i s btn'''
                          - grid-template-columns: 60px 1fr min-content
                          - grid-template-rows: min-content
                        card:
                          - background-color: none
                          - padding: 10px 10px 10px 0px
                        img_cell:
                          - justify-content: start
                          - position: absolute
                          - width: 40px
                          - height: 40px
                          - left: 0
                          - bottom: 0
                          - margin: 0 0 8px 10px
                          - border-radius: 50%
                          - border: |
                              [[[
                                if (entity.state == 'home') {
                                  return '2px solid rgb(227, 243, 184)';
                                } else {
                                  return 'none';
                                }
                              ]]]
                        entity_picture:
                          - width: 40px
                          - height: 40px
                        name:
                          - align-self: start
                          - justify-self: start
                          - color: none
                          - font-size: 14px
                          - font-weight: 600
                        state:
                          - align-self: start
                          - justify-self: start
                          - color: none
                          - font-size: 12px
                          - opacity: 0.7
                          - margin-top: '-5px'
                        custom_fields:
                          btn:
                            - align-self: end
                            - justify-self: end
                          badge:
                            - position: absolute
                            - left: 38px
                            - top: 5px
                      custom_fields:
                        badge:
                          card:
                            type: custom:button-card
                            entity: '[[[ return entity.entity_id ]]]'
                            show_icon: true
                            show_name: false
                            icon: mdi:home
                            state:
                              - value: home
                                icon: mdi:home
                                styles:
                                  card:
                                    - background: rgb(227, 243, 184)
                              - value: not_home
                                icon: mdi:home-export-outline
                                styles:
                                  card:
                                    - background: rgb(239,150,142)
                              - value: School
                                icon: mdi:school
                                styles:
                                  card:
                                    - background: rgb(233,189,250)
                            styles:
                              card:
                                - border-radius: 50%
                                - width: 16px
                                - height: 16px
                                - background: none
                              icon:
                                - color: black
                                - width: 12px
                        btn:
                          card:
                            type: custom:mushroom-chips-card
                            chips:
                              - type: entity
                                tap_action:
                                  action: more-info
                                entity: '[[[ return variables.sensor ]]]'
                                content_info: none
                                card_mod:
                                  style: |
                                    ha-card {
                                      --chip-background: black;
                                      --color: white;
                                      padding: 0px !important;
                                      box-shadow: none !important;
                                    }
                columns: 2
            grid_options:
              columns: 21
              rows: 2
        column_span: 2
      - type: grid
        cards:
          - type: heading
            heading: Rooms
            heading_style: title
            icon: mdi:floor-plan
            grid_options:
              columns: full
              rows: 1
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: input_boolean.all_rooms
                tap_action:
                  action: toggle
          - square: false
            type: grid
            cards:
              - type: custom:button-card
                entity: light.deska_monitor_svetlo_monitor_led_pas
                variables:
                  icon: mdi:desk
                  sensor: binary_sensor.sonoff_1001f84959
                  state: |
                    [[[
                      var temp = states['sensor.detska_teplomer_teplota'].state;
                      var hum = states['sensor.detska_teplomer_vlhkost'].state;
                      return `
                      ${parseFloat(temp).toFixed(0)}°<span style="font-size: 0.4em; opacity: 0.6; margin-left: 4px;">${parseFloat(hum).toFixed(0)}%</span>
                      `
                    ]]]
                name: Kids<br>Room
                icon: |
                  [[[
                    if (states[variables.sensor].state == "on") return "mdi:door-open";
                    else return variables.icon;
                  ]]]
                tap_action:
                  action: navigate
                  navigation_path: '#kids-room'
                hold_action:
                  action: toggle
                state:
                  - value: 'on'
                    styles:
                      card:
                        - height: 155px
                      grid:
                        - grid-template-areas: '''n i'' ''temp temp'' ''slider slider'''
                        - grid-template-rows: 1fr min-content
                        - grid-template-columns: 1fr 1fr
                      custom_fields:
                        temp:
                          - margin-bottom: 15px
                    custom_fields:
                      slider:
                        card:
                          type: custom:my-slider-v2
                          entity: '[[[ return entity.entity_id ]]]'
                          colorMode: brightness
                          styles:
                            container:
                              - background: none
                              - border-radius: 0px
                              - overflow: visible
                            card:
                              - height: 45px
                              - padding: 0px
                              - background: >-
                                  linear-gradient(180deg, rgba(255,255,255,0)
                                  0%, rgba(255,255,255,0.35) 100%)
                              - border-radius: 0px 0px 24px 24px
                              - width: 110%
                              - position: absolute
                              - margin-top: '-15px'
                              - margin-left: '-12px'
                            track:
                              - overflow: visible
                              - background: none
                            progress:
                              - background: >-
                                  linear-gradient(90deg, rgba(255,255,255,0) 0%,
                                  rgba(255,255,255,0.8) 100%)
                              - height: 45px
                            thumb:
                              - background: none
                              - height: 45px
                              - width: 1px
                styles:
                  grid:
                    - grid-template-areas: '''n i'' ''temp temp'''
                    - grid-template-rows: 1fr min-content
                    - grid-template-columns: 1fr 1fr
                  card:
                    - padding: 12px
                    - height: 130px
                    - border-radius: 24px
                    - overflow: hidden
                    - background: |
                        [[[
                          if (entity.state == "on") return "rgb(255,219,121)";
                          else return "#1a1a1a";
                        ]]]
                  icon:
                    - width: 24px
                    - color: |
                        [[[
                          if (states[variables.sensor].state == "on") return "black";
                          else return "#AAAAAA";
                        ]]]
                  img_cell:
                    - justify-self: end
                    - background: |
                        [[[
                          if (states[variables.sensor].state == "on") return "rgb(254,145,138)";
                          else return "#333333";
                        ]]]
                    - border-radius: 100%
                    - align-self: start
                    - width: 48px
                    - height: 48px
                  name:
                    - justify-self: start
                    - align-self: start
                    - text-align: left
                    - font-size: 16px
                    - font-weight: 500
                    - padding-left: 4px
                    - color: |
                        [[[
                          if (entity.state == "on") return "black";
                          else return "white";
                        ]]]
                  custom_fields:
