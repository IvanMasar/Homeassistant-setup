esphome:
  name: teplomer-esp32-c3
  friendly_name: teplomer-esp32-c3
  min_version: 2025.5.0
  name_add_mac_suffix: false
  project:
    name: esphome.web
    version: dev

  on_boot:
    priority: -100
    then:
      - logger.log: "Prebudenie: Stabilizujem senzor..."
      - delay: 5s                     
      - component.update: dht_sensor
      - delay: 2s  
      - component.update: dht_sensor
      - component.update: battery_voltage 
      - delay: 2s                     
      - component.update: battery_level
      - logger.log: "Dáta pripravené, odosielam do Home Assistanta..."
      - delay: 8s                     
      - logger.log: "Hotovo, idem spať na 30 minút."
      - deep_sleep.enter: deep_sleep_mode

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:
api:
ota:
  - platform: esphome
improv_serial:


wifi:
  ssid: !secret wifi_ssid      
  password: !secret wifi_password  
  
  manual_ip:
    static_ip: XXX.XXX.XXX.XXX       
    gateway: XXX.XXX.XXX.XXX           
    subnet: XXX.XXX.XXX.XXX           
  
  ap: {} 
# -----------------------------------

captive_portal:

dashboard_import:
  package_import_url: github://esphome/example-configs/esphome-web/esp32.yaml@main
  import_full_config: true

web_server:

# --- SENZORY ---
sensor:
  # Teplota a Vlhkosť (DHT22)
  - platform: dht
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
    model: AM2302
    id: dht_sensor
    temperature:
      name: "Teplota"
      id: temperature
      accuracy_decimals: 1
      filters:
        - lambda: |-
            if (x < -40 || x > 80) return NAN;
            return x;
    humidity:
      name: "Vlhkosť"
      id: humidity
      accuracy_decimals: 1
      filters:
        - lambda: |-
            if (x < 0 || x > 100) return NAN;
            return x;
    update_interval: never

  # Meranie napätia batérie (ADC)
  - platform: adc
    pin: GPIO4
    id: battery_voltage
    name: "Napätie batérie"
    attenuation: 12db
    update_interval: never
    unit_of_measurement: "V"
    filters:
      - multiply: 2.0

  # Výpočet percent batérie
  - platform: template
    name: "Stav batérie"
    id: battery_level
    unit_of_measurement: "%"
    device_class: "battery"
    update_interval: never
    lambda: |-
      float volt = id(battery_voltage).state;
      if (volt < 3.2) return 0;
      if (volt > 4.2) return 100;
      return (volt - 3.2) * 100.0 / (4.2 - 3.2);
    accuracy_decimals: 0

# --- REŽIM SPÁNKU ---
deep_sleep:
  id: deep_sleep_mode
  run_duration: 30s
  sleep_duration: 30min
